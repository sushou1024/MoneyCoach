  /cik_code:
    get:
      tags:
        - EDGAR
      summary: Find CIK Code by Company Name
      description: >-
        Endpoint provides CIK code information with a search by company name or
        part of the company name. For example, if you search for “APP” in the
        response, the endpoint will provide information on the CIK code for all
        of the companies that we have in the database that have “APP” (“app”) in
        their name. If you enter “Example LLC”, then the API will give a
        response with all companies having “Example LLC” in the name, Example
        LLC Florida, Example LLC., Example LLC International, etc.
      parameters:
        - name: access_key
          in: query
          description: Your Marketstack API access key.
          required: true
          schema:
            type: string
        - name: company_name
          in: query
          description: Company name (min 3 letters) used to search CIK codes.
          required: true
          schema:
            type: string
        - name: limit
          in: query
          description: Pagination limit (results per page). Default 100, maximum 1000.
          required: false
          schema:
            maximum: 1000
            minimum: 1
            type: integer
        - name: offset
          in: query
          description: Pagination offset (number of results to skip). Default 0.
          required: false
          schema:
            minimum: 0
            type: integer
      responses:
        '200':
          description: CIK search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CIKSearchResponse'
  /company_name:
    get:
      tags:
        - EDGAR
      summary: Find Company Name by CIK Code
      description: >-
        Find Company Name by CIK code, which will provide a company name with a
        search by the CIK Code. The CIK code must be entered with all 10 digits,
        including leading zeros if any. Since the CIK code is a unique code for
        every company, we also have CIK code validation, meaning if the CIK code
        is not entered in the correct format with all of the digits, we return
        an error for invalid CIK format. This API endpoint returns data only in
        case we have an exact match in the CIK code.
      parameters:
        - name: access_key
          in: query
          description: Your Marketstack API access key.
          required: true
          schema:
            type: string
        - name: cik_code
          in: query
          description: 10-digit SEC Central Index Key (with leading zeros).
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Company information retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyNameByCIKResponse'
  /submissions:
    get:
      tags:
        - EDGAR
      summary: Company Submission Data
      description: >-
        Returns submission details for a specific CIK. Pass atleast one
        parameter `cik_code_name` or  `cik_code`
      parameters:
        - name: access_key
          in: query
          description: Your Marketstack API access key.
          required: true
          schema:
            type: string
        - name: cik_code
          in: query
          description: >-
            The exact 10-digit CIK code including leading zeros (e.g.,
            `0001509697`).
          required: false
          schema:
            type: string
        - name: cik_code_name
          in: query
          description: >-
            The exact 10-digit CIK code including leading zeros ending with
            -submissions.json (e.g., `CIK0001509697-submissions.json`).
          required: false
          schema:
            type: string
        - name: report_from
          in: query
          description: Filter filings by report date from this date (YYYY-MM-DD).
          required: false
          schema:
            type: string
            format: date
        - name: report_to
