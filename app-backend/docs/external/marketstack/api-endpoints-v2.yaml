  parameters:
    AccessKey:
      name: access_key
      in: query
      description: Your Marketstack API access key.
      required: true
      schema:
        type: string
    Limit:
      name: limit
      in: query
      description: Pagination limit (results per page). Default 100, maximum 1000.
      required: false
      schema:
        maximum: 1000
        minimum: 1
        type: integer
    Offset:
      name: offset
      in: query
      description: Pagination offset (number of results to skip). Default 0.
      required: false
      schema:
        minimum: 0
        type: integer
    CommodityName:
      name: commodity_name
      in: query
      description: >-
        Specify the commodity_name for which you like to receive the Price,
        aluminum for example.
      required: true
      schema:
        type: string
    Frequency:
      name: frequency
      in: query
      description: >-
        Specify the frequency of the commodity prices. Available options are
        `daily`, `weekly`, `monthly`, `quarterly`, and `yearly`. Default is
        `daily`.
      required: false
      schema:
        type: string
        enum:
          - daily
          - weekly
          - monthly
          - quarterly
          - yearly
    Ticker:
      name: ticker
      in: query
      description: One or more comma-separated ticker symbols (e.g., `AAPL,MSFT`).
      required: true
      schema:
        type: string
    Rated:
      name: rated
      in: query
      description: Filter response on buy, sell, or hold.
      required: false
      schema:
        type: string
        enum:
          - buy
          - sell
          - hold
    Symbols:
      name: symbols
      in: query
      description: One or more comma-separated ticker symbols (e.g., `AAPL,MSFT`).
      required: true
      schema:
        type: string
    DateFrom:
      name: date_from
      in: query
      description: Filter results from this date (inclusive). Format `YYYY-MM-DD`.
      required: false
      schema:
        type: string
        format: date
    DateTo:
      name: date_to
      in: query
      description: Filter results up to this date (inclusive). Format `YYYY-MM-DD`.
      required: false
      schema:
        type: string
        format: date
    Exchange:
      name: exchange
      in: query
      description: >-
        Filter your results based on a specific stock exchange by specifying the
        MIC identification of a stock exchange.
      required: false
      schema:
        type: string
    AfterHours:
      name: after_hours
      in: query
      description: >-
        If set to true, includes pre and post market data if available. By
        default is set to false.
      required: false
      schema:
        type: boolean
    Sort:
      name: sort
      in: query
      description: Sort order. Use `ASC` for oldest first or `DESC` for newest first.
      required: false
      schema:
        type: string
        enum:
          - ASC
          - DESC
    Interval:
      name: interval
      in: query
      description: Intraday aggregation interval.
      required: false
      schema:
        type: string
        enum:
          - 1min
          - 5min
          - 10min
          - 15min
          - 30min
          - 1hour
    Search:
      name: search
      in: query
      description: Search term to filter tickers by name or symbol.
      required: false
      schema:
        type: string
    ExchangeFilter:
      name: exchange
      in: query
      description: >-
        Filter by stock exchange MIC (e.g., `XNAS`, `XNYS`) or code (e.g.,
        `NASDAQ`).
      required: false
      schema:
        type: string
    MIC:
      name: mic
      in: path
      description: Exchange MIC identifier (e.g., `XNAS`).
      required: true
      schema:
        type: string
    DatePath:
      name: date
      in: path
      description: Specific date for EOD data. Format `YYYY-MM-DD`.
      required: true
      schema:
        type: string
        format: date
    DateTimePath:
      name: date
      in: path
      description: Specific date for intraday data. Example `2024-09-27 15:30`.
      required: true
      schema:
        type: string
    IndexCode:
      name: index
      in: query
      description: Benchmark/index identifier (e.g., `australia_all_ordinaries`).
      required: true
      schema:
        type: string
    CountryName:
      name: country
      in: query
      description: Country name for bonds endpoint (e.g., `kenya`, `united%20states`).
      required: true
      schema:
        type: string
    ETFTicker:
      name: ticker
      in: query
      description: ETF ticker symbol.
      required: true
      schema:
        type: string
    ETFListType:
      name: list
      in: query
      description: ETF list type; currently `ticker`.
      required: true
      schema:
        type: string
        enum:
          - ticker
    CIKCompanyName:
      name: company_name
      in: query
      description: Company name (min 3 letters) used to search CIK codes.
      required: true
      schema:
        type: string
    CIKCode:
      name: cik_code
      in: query
      description: 10-digit SEC Central Index Key (with leading zeros).
      required: true
      schema:
        type: string
  securitySchemes:
    ApiKeyQuery:
      type: apiKey
      description: Your Marketstack API access key.
      name: access_key
      in: query
