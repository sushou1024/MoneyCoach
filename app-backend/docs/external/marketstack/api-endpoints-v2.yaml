          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyFactsByCIKResponse'
  /concept/accounts_payable:
    get:
      tags:
        - EDGAR
      summary: Company Concepts for US GAAP Accounts Payable
      description: >-
        This API endpoint returns all the disclosures from a single company
        (CIK) and concept (a taxonomy and tag) into a single JSON file, with a
        separate array of facts for each units on measure that the company has
        chosen to disclose (e.g. net profits reported in U.S. dollars and in
        Canadian dollars).
      parameters:
        - name: access_key
          in: query
          description: Your Marketstack API access key.
          required: true
          schema:
            type: string
        - name: cik_code
          in: query
          description: 10-digit SEC Central Index Key (with leading zeros).
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Accounts Payable data retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPayableResponse'
  /frames/accounts_payable/{unit}:
    get:
      tags:
        - EDGAR
      summary: Company Concepts for US GAAP Accounts Payable in a Specific Unit
      description: >
        The frames API aggregates one fact for each reporting entity that is the
        last filed that most closely fits the calendrical period requested. This
        API supports annual, quarterly, and instantaneous data. This API
        endpoint is made for the US-GAAP taxonomy and the Accounts Payable
        Current type of the taxonomy.           

        Where the units of measure specified in the API contain a numerator and
        a denominator, these are separated by “-per-” such as “USD-per-shares”.
        Note that the default unit in XBRL is “pure”.           

        The period format is CY#### for annual data (duration 365 days +/- 30
        days), CY####Q# for quarterly data (duration 91 days +/- 30 days), and
        CY####Q#I for instantaneous data. Because company financial calendars
        can start and end on any month or day and even change in length from
        quarter to quarter according to the day of the week, the frame data is
        assembled by the dates that best align with a calendar quarter or year.
        Data users should be mindful of the different reporting start and end
        dates for facts contained in a frame.
      parameters:
        - name: access_key
          in: query
          description: Your Marketstack API access key.
          required: true
          schema:
            type: string
        - name: frame
          in: query
          description: >-
            This is the information of the frame for which we want to receive
            information.
          required: true
          schema:
            type: string
        - name: unit
          in: path
          description: >-
            The unit in which the data is requested. This parameter usually is
            USD. Validate and sanitize parameter inputs to ensure API security
            and expected input values.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Accounts Payable data in the specified unit retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FrameResponse'
