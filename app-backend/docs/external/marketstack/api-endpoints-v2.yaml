openapi: 3.0.3
info:
  title: Marketstack API v2
  description: >
    The official Marketstack API documentation will help you learn how to query
    the Marketstack JSON API for real-time, intraday, and historical stock
    market data, along with more advanced EDGAR data endpoints. Also, define
    multiple stock symbols, retrieve extensive data about 2700+ Stock Exchanges
    Info, 30000+ Stock tickers from more than 50 countries, as well as 750 +
    Stock Market indexes, information about timezones, currencies, and more.


    Our API is built upon a RESTful and easy-to-understand request and response
    structure. API requests are always sent using a simple API request URL with
    a series of required and optional HTTPS GET parameters, and API responses
    are provided in lightweight JSON format.
  version: 2.0.0
servers:
  - url: https://api.marketstack.com/v2
security:
  - ApiKeyQuery: []
tags:
  - name: End-of-day
  - name: Intraday
  - name: Stock Prices
  - name: Commodities
  - name: Company Ratings
  - name: Splits
  - name: Dividends
  - name: Tickers
  - name: Indexes
  - name: Exchanges
  - name: Currencies
  - name: Timezones
  - name: Bonds
  - name: ETFs
  - name: EDGAR
paths:
  /eod:
    get:
      tags:
        - End-of-day
      summary: EOD Data
      description: >-
        You can use the API's `eod` endpoint in order to obtain end-of-day data
        for one or multiple stock tickers. A single or multiple comma-separated
        ticker symbols are passed to the API using the `symbols` parameter.



        **Note:**


        * *The EOD data has access to over 500,000 tickers from more major
        world-known exchanges. The full list of supported tickers and exchanges
        can be seen here:*
        [**Download**](https://marketstack.com/download/v2_eod_tickers_finnworlds_tiingo.xlsx)


        * *A daily updated list of all tickers accessible via Marketstack is
        available for download:* [**Download Ticker
        List**](https://marketstack.com/download/supported_tickers_2.csv)


        * *The V2 EOD endpoint supports data from **30+ stock exchanges**,
        including **NASDAQ,** **PINK, SHG, NYSE, NYSE ARCA, OTCQB,** and
        **BATS***


        * *To retrieve end-of-day data for individual tickers, you can also use
        the Tickers Endpoint.*


        * ***Ticker Symbol Formatting:** When querying ticker symbols that
        include a period (.), replace the period with a hyphen (-) in the
        intraday endpoint. **Example:BRK.B → BRK-B***


        **Adjusted Prices:**

        “**Adjusted**” prices represent stock values that have been modified to
        accurately reflect the impact of corporate actions such as splits and
        dividends. These adjustments are applied following the CRSP Calculations
        methodology established by the **Center for Research in Security Prices
        (CRSP).**
      parameters:
        - name: access_key
          in: query
          description: Your Marketstack API access key.
          required: true
          schema:
            type: string
        - name: symbols
          in: query
          description: One or more comma-separated ticker symbols (e.g., `AAPL,MSFT`).
          required: true
          schema:
            type: string
        - name: exchange
          in: query
          description: >-
            Filter your results based on a specific stock exchange by specifying
            the MIC identification of a stock exchange.
          required: false
          schema:
            type: string
        - name: date_from
          in: query
          description: Filter results from this date (inclusive). Format `YYYY-MM-DD`.
          required: false
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          description: Filter results up to this date (inclusive). Format `YYYY-MM-DD`.
          required: false
          schema:
            type: string
            format: date
        - name: sort
          in: query
          description: Sort order. Use `ASC` for oldest first or `DESC` for newest first.
          required: false
          schema:
            type: string
            enum:
              - ASC
              - DESC
        - name: limit
          in: query
          description: Pagination limit (results per page). Default 100, maximum 1000.
          required: false
          schema:
            maximum: 1000
            minimum: 1
            type: integer
        - name: offset
          in: query
          description: Pagination offset (number of results to skip). Default 0.
          required: false
          schema:
            minimum: 0
            type: integer
      responses:
        '200':
          description: EOD data retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EODResponse'
  /eod/latest:
    get:
      tags:
        - End-of-day
      summary: EOD Latest Data
      description: Returns the most recent end-of-day data point for the requested symbols.
      parameters:
        - name: access_key
          in: query
          description: Your Marketstack API access key.
          required: true
          schema:
            type: string
        - name: symbols
          in: query
          description: One or more comma-separated ticker symbols (e.g., `AAPL,MSFT`).
          required: true
          schema:
            type: string
        - name: exchange
          in: query
          description: >-
            Filter your results based on a specific stock exchange by specifying
            the MIC identification of a stock exchange.
          required: false
          schema:
            type: string
        - name: sort
          in: query
          description: Sort order. Use `ASC` for oldest first or `DESC` for newest first.
          required: false
          schema:
            type: string
            enum:
              - ASC
              - DESC
        - name: limit
          in: query
          description: Pagination limit (results per page). Default 100, maximum 1000.
          required: false
          schema:
            maximum: 1000
            minimum: 1
            type: integer
        - name: offset
          in: query
          description: Pagination offset (number of results to skip). Default 0.
          required: false
          schema:
            minimum: 0
            type: integer
      responses:
        '200':
          description: Latest EOD data retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EODResponse'
  /eod/{date}:
    get:
      tags:
        - End-of-day
      summary: EOD Data for a Specific Date
      description: >-
        Specify a date in `YYYY-MM-DD` format. You can also specify an exact
        time in ISO-8601 date format. For example, `2020-05-21T00:00:00+0000`.
        Example, `/eod/2020-01-01`
      parameters:
        - name: access_key
          in: query
          description: Your Marketstack API access key.
          required: true
          schema:
            type: string
        - name: date
          in: path
          description: Specific date for EOD data. Format `YYYY-MM-DD`.
          required: true
          schema:
            type: string
            format: date
        - name: symbols
          in: query
          description: One or more comma-separated ticker symbols (e.g., `AAPL,MSFT`).
          required: true
          schema:
            type: string
        - name: exchange
          in: query
          description: >-
            Filter your results based on a specific stock exchange by specifying
            the MIC identification of a stock exchange.
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: Pagination limit (results per page). Default 100, maximum 1000.
          required: false
          schema:
            maximum: 1000
            minimum: 1
            type: integer
        - name: offset
          in: query
          description: Pagination offset (number of results to skip). Default 0.
          required: false
          schema:
            minimum: 0
            type: integer
        - name: sort
          in: query
          description: Sort order. Use `ASC` for oldest first or `DESC` for newest first.
          required: false
          schema:
            type: string
            enum:
              - ASC
              - DESC
      responses:
        '200':
          description: EOD data for the date retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EODResponse'
  /intraday:
    get:
      tags:
        - Intraday
      summary: Intraday Data
      description: >-
        In additional to daily end-of-day stock prices, the Marketstack API also
        supports intraday data with data intervals as short as one minute.
        Intraday prices are available for all US stock tickers included in the
        IEX (Investors Exchange) stock exchange.


        To access intraday market data, use the API’s Intraday Endpoint and
        specify your desired stock ticker symbols.


        **Notes:**


        * *A daily updated list of all tickers accessible via Marketstack is
        available for download:[**Download Ticker
        List**](https://marketstack.com/download/supported_tickers_2.csv)*


        * *You can also request intraday data for **individual ticker symbols**
        using the **Tickers Endpoint.***


        * ***Ticker Symbol Formatting:** When querying ticker symbols that
        include a period (.), replace the period with a hyphen (-) when using
        the Intraday Endpoint. **Example:** BRK.B → BRK-B*


        **IMPORTANT NOTE:** In the case of Intraday, Marketstack provides
        derived data that calculates a real-time reference price for each asset.
        While this is not a substitute for the TOPS Feed, we believe it will
        fulfill the needs of 95% of our customer base.


        We’re doing so because as of **February 1st, 2025**, the IEX Exchange
        has changed its market data policies. To receive the FULL TOPS Feed, you
        must now have a market data agreement signed with the IEX Exchange. This
        means that the parameters bidPrice, bidSize, askPrice, askSize,
        lastPrice, lastSize, mid, and last will all return NULL in the API
        response for intraday since **IEX entitlement is required** for them. If
        you still need to have access to TOPS Feed, please contact our customer
        support team before signing any contract with them.


        For using our derived data, there is no need to have a market data
        agreement signed with the IEX exchange, and there is no additional cost
        to the IEX Exchange.`
      parameters:
        - name: access_key
          in: query
          description: Your Marketstack API access key.
          required: true
          schema:
            type: string
        - name: symbols
          in: query
          description: One or more comma-separated ticker symbols (e.g., `AAPL,MSFT`).
          required: true
          schema:
            type: string
        - name: interval
          in: query
          description: Intraday aggregation interval.
          required: false
          schema:
            type: string
            enum:
              - 1min
              - 5min
              - 10min
              - 15min
              - 30min
              - 1hour
        - name: exchange
          in: query
          description: >-
            Filter your results based on a specific stock exchange by specifying
            the MIC identification of a stock exchange.
          required: false
          schema:
            type: string
        - name: date_from
          in: query
          description: Filter results from this date (inclusive). Format `YYYY-MM-DD`.
          required: false
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          description: Filter results up to this date (inclusive). Format `YYYY-MM-DD`.
          required: false
          schema:
            type: string
            format: date
        - name: sort
          in: query
          description: Sort order. Use `ASC` for oldest first or `DESC` for newest first.
          required: false
          schema:
            type: string
            enum:
              - ASC
              - DESC
        - name: limit
          in: query
          description: Pagination limit (results per page). Default 100, maximum 1000.
          required: false
          schema:
            maximum: 1000
            minimum: 1
            type: integer
        - name: offset
          in: query
          description: Pagination offset (number of results to skip). Default 0.
          required: false
          schema:
            minimum: 0
            type: integer
        - name: after_hours
          in: query
          description: >-
            If set to true, includes pre and post market data if available. By
            default is set to false.
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Intraday data retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntradayResponse'
  /intraday/latest:
    get:
      tags:
        - Intraday
      summary: Intraday Latest Data
      description: >-
        Returns the most recent intraday bar for the requested symbols.


        **Real-Time Updates:** Please note that data frequency intervals below
        15 minutes (15min) are only supported if you are subscribed to the
        Professional Plan or higher.


        US equity markets close at **4:00 PM EST**, with trades at or after this
        time considered after-hours (retrievable with `after_hours=true`),
        though IEX after-hours data may be sparse, and note that intraday
        closing prices differ from official EOD closes, which are set via an
        auction process
        [Investopedia](https://www.investopedia.com/articles/investing/091113/auction-method-how-nyse-stock-prices-are-set.asp)
      parameters:
        - name: access_key
          in: query
          description: Your Marketstack API access key.
          required: true
          schema:
            type: string
        - name: symbols
          in: query
          description: One or more comma-separated ticker symbols (e.g., `AAPL,MSFT`).
          required: true
          schema:
            type: string
        - name: interval
          in: query
          description: Intraday aggregation interval.
          required: false
          schema:
            type: string
            enum:
              - 1min
              - 5min
              - 10min
              - 15min
              - 30min
              - 1hour
        - name: exchange
          in: query
          description: >-
            Filter your results based on a specific stock exchange by specifying
            the MIC identification of a stock exchange.
          required: false
          schema:
            type: string
        - name: after_hours
          in: query
          description: >-
            If set to true, includes pre and post market data if available. By
            default is set to false.
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Latest intraday data retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntradayResponse'
  /intraday/{date}:
    get:
      tags:
        - Intraday
      summary: Intraday Data for a Specific Date
      description: >-
        Specify a date in `YYYY-MM-DD` format. You can also specify an exact
        time in ISO-8601 date format. For example, `2020-05-21T00:00:00+0000`.
        Example, `/intraday/2020-01-01`
      parameters:
        - name: access_key
          in: query
          description: Your Marketstack API access key.
          required: true
          schema:
            type: string
        - name: date
          in: path
          description: Specific date for intraday data. Example `2024-09-27 15:30`.
          required: true
          schema:
            type: string
        - name: symbols
          in: query
          description: One or more comma-separated ticker symbols (e.g., `AAPL,MSFT`).
          required: true
          schema:
            type: string
        - name: interval
          in: query
          description: Intraday aggregation interval.
          required: false
          schema:
            type: string
            enum:
              - 1min
              - 5min
              - 10min
              - 15min
              - 30min
              - 1hour
        - name: exchange
          in: query
          description: >-
            Filter your results based on a specific stock exchange by specifying
            the MIC identification of a stock exchange.
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: Pagination limit (results per page). Default 100, maximum 1000.
          required: false
          schema:
            maximum: 1000
            minimum: 1
            type: integer
        - name: offset
          in: query
          description: Pagination offset (number of results to skip). Default 0.
          required: false
          schema:
            minimum: 0
            type: integer
        - name: after_hours
          in: query
          description: >-
            If set to true, includes pre and post market data if available. By
            default is set to false.
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Intraday data for the date retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntradayResponse'
  /stockprice:
    get:
      tags:
        - Stock Prices
      summary: Real-time Stock Market Prices
      description: >-
        Real-time Stock Market Prices endpoint delivers instant access to live
        market data for stocks across major exchanges worldwide. Track intraday
        stock performance on `NYSE`, `NASDAQ`, `LON`, `WSE`, `EPA`, `SHE`,
        `NSE`, and much more.
      parameters:
        - name: access_key
          in: query
          description: Your Marketstack API access key.
          required: true
          schema:
            type: string
        - name: ticker
          in: query
          description: Ticker for which to retrieve the stock price (e.g., `AAPL`).
          required: true
          schema:
            type: string
        - name: exchange
          in: query
          description: Optional exchange filter (e.g., `NASDAQ`).
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Real-time stock price data retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockPriceResponse'
  /commodities:
    get:
      tags:
        - Commodities
      summary: Commodity Prices
      description: >-
        Get commodity prices of 70+ world-known commodities of energy, metals,
        industrial, agricultural, and livestock areas.


        **Note:**


        * Rate limit for 1 API call per minute is enforced on this endpoint. See
        the full list of available commodities in the file presented
        here:[**Download**](https://marketstack.com/download/marketstack-commodities.xlsx)


        * Historical end-of-day data (`eod`) is available for up to 15 years
        back, while intraday data (`intraday`) always only offers the last
        10,000 entries for each of the intervals available. **Example:** For a
        1-minute interval, historical intraday data is available for up to
        10,000 minutes back.
      parameters:
        - name: access_key
          in: query
          description: Your Marketstack API access key.
          required: true
          schema:
            type: string
        - name: commodity_name
          in: query
          description: >-
            Specify the commodity_name for which you like to receive the Price,
            aluminum for example.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Real-time commodity prices retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommodityResponse'
  /commoditieshistory:
    get:
      tags:
        - Commodities
      summary: Commodities Historical Prices
      description: >-
        If you are looking for past commodity prices, you can use the Historical
        Commodity Prices endpoint, where you can choose specific dates and
        search by individual commodities. Additionally, the API offers options
        for daily data from the previous five years or monthly intervals using
        the `frequency` parameter.


        **Note:**


        * A rate limit of 1 API call per minute is enforced on this endpoint.


        * The recommended historical date range for a single API call is 1 year
        when requesting daily data. While larger ranges (up to 1.5 years) may
        work, retrieving data one year at a time ensures consistency.


        * Historical data for Commodities is available for up to 15 years in the
        past, though coverage varies by commodity type like **Metals:**
        Typically over 13 years of historical data, with some having as few as 2
        years. **Energy:** Generally 15 years of coverage, though a few have up
        to 10 years. **Industrial:** Usually 15 years, with some limited to 10
        years. **Livestock and Agricultural:** Coverage ranges from 9 to 15
        years.
      parameters:
        - name: access_key
          in: query
          description: Your Marketstack API access key.
          required: true
          schema:
            type: string
        - name: commodity_name
          in: query
          description: >-
            Specify the commodity_name for which you like to receive the Price,
            aluminum for example.
          required: true
          schema:
            type: string
        - name: date_from
          in: query
          description: Filter results from this date (inclusive). Format `YYYY-MM-DD`.
          required: false
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          description: Filter results up to this date (inclusive). Format `YYYY-MM-DD`.
          required: false
          schema:
            type: string
            format: date
        - name: frequency
          in: query
          description: >-
            Specify the frequency of the commodity prices. Available options are
            `daily`, `weekly`, `monthly`, `quarterly`, and `yearly`. Default is
            `daily`.
          required: false
          schema:
            type: string
            enum:
              - daily
              - weekly
              - monthly
              - quarterly
              - yearly
      responses:
        '200':
          description: Historical commodity prices retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommodityHistoricalResponse'
  /companyratings:
    get:
      tags:
        - Company Ratings
      summary: Company Ratings
      description: >-
        The Company Rating Endpoint delivers real-time buy/sell/hold analyst
        ratings, updated as new reports are published. It also provides 15+
        years of historical ratings and price targets to track trends and
        analyst performance over time.



        **Note:** Rate limit is enforced to 1 API call per minute.
      parameters:
        - name: access_key
          in: query
          description: Your Marketstack API access key.
          required: true
          schema:
            type: string
        - name: ticker
          in: query
          description: One or more comma-separated ticker symbols (e.g., `AAPL,MSFT`).
          required: true
          schema:
            type: string
        - name: date_from
          in: query
          description: Filter results from this date (inclusive). Format `YYYY-MM-DD`.
          required: false
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          description: Filter results up to this date (inclusive). Format `YYYY-MM-DD`.
          required: false
          schema:
            type: string
            format: date
        - name: rated
          in: query
          description: Filter response on buy, sell, or hold.
          required: false
          schema:
            type: string
            enum:
              - buy
              - sell
              - hold
      responses:
        '200':
          description: Company ratings data retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyRatingsResponse'
  /splits:
    get:
      tags:
        - Splits
      summary: Splits Data
      description: >-
        Using the Splits Data endpoint, you will be able to look up information
        about the stock splits factor for different symbols.



        **Note:** The V2 Splits Endpoint provides split data for symbols listed
        on **NASDAQ, PINK, SHG, NYSE, NYSE ARCA, OTCQB,** and **BATS**. You can
        also retrieve split information for individual ticker symbols using the
        Tickers Endpoint.
      parameters:
        - name: access_key
          in: query
          description: Your Marketstack API access key.
          required: true
          schema:
            type: string
        - name: symbols
          in: query
          description: One or more comma-separated ticker symbols (e.g., `AAPL,MSFT`).
          required: true
          schema:
            type: string
        - name: date_from
          in: query
          description: Filter results from this date (inclusive). Format `YYYY-MM-DD`.
          required: false
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          description: Filter results up to this date (inclusive). Format `YYYY-MM-DD`.
          required: false
          schema:
            type: string
            format: date
        - name: sort
          in: query
          description: Sort order. Use `ASC` for oldest first or `DESC` for newest first.
          required: false
          schema:
            type: string
            enum:
              - ASC
              - DESC
        - name: limit
          in: query
          description: Pagination limit (results per page). Default 100, maximum 1000.
          required: false
          schema:
            maximum: 1000
            minimum: 1
            type: integer
        - name: offset
          in: query
          description: Pagination offset (number of results to skip). Default 0.
          required: false
          schema:
            minimum: 0
            type: integer
      responses:
        '200':
          description: Splits data retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SplitsResponse'
  /dividends:
    get:
      tags:
        - Dividends
      summary: Dividends Data
      description: >-
        Using the Dividends Data endpoint, you will be able to look up
        information about the stock dividend for different symbols.


        **Note:** The **V2 Dividend Endpoint** provides dividend data for
        symbols listed on **NASDAQ, PINK, SHG, NYSE, NYSE ARCA, OTCQB,** and
        **BATS**, and dividend information for individual ticker symbols can
        also be retrieved using the **Tickers Endpoint**.
      parameters:
        - name: access_key
          in: query
          description: Your Marketstack API access key.
          required: true
          schema:
            type: string
        - name: symbols
          in: query
          description: One or more comma-separated ticker symbols (e.g., `AAPL,MSFT`).
          required: true
          schema:
            type: string
        - name: date_from
          in: query
          description: Filter results from this date (inclusive). Format `YYYY-MM-DD`.
          required: false
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          description: Filter results up to this date (inclusive). Format `YYYY-MM-DD`.
          required: false
          schema:
            type: string
            format: date
        - name: sort
          in: query
          description: Sort order. Use `ASC` for oldest first or `DESC` for newest first.
          required: false
          schema:
            type: string
            enum:
              - ASC
              - DESC
        - name: limit
          in: query
          description: Pagination limit (results per page). Default 100, maximum 1000.
          required: false
          schema:
            maximum: 1000
            minimum: 1
            type: integer
        - name: offset
          in: query
          description: Pagination offset (number of results to skip). Default 0.
          required: false
          schema:
            minimum: 0
            type: integer
      responses:
        '200':
          description: Dividends data retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DividendsResponse'
  /tickers/{symbol}:
    get:
      tags:
        - Tickers
      summary: Ticker Information
      description: >-
        Using the API's Tickers endpoint you will be able to look up information
        about one or multiple stock ticker symbols as well as obtain end-of-day,
