            format: date
        - name: filing_from
          in: query
          description: Filter filings by filing date from this date (YYYY-MM-DD).
          required: false
          schema:
            type: string
            format: date
        - name: filing_to
          in: query
          description: Filter filings by filing date to this date (YYYY-MM-DD).
          required: false
          schema:
            type: string
            format: date
        - name: accession_number
          in: query
          description: >-
            Filter filings by exact accession number (e.g.,
            `0001193125-20-209580`).
          required: false
          schema:
            type: string
      responses:
        '200':
          description: SEC submissions retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionsByCIKResponse'
  /company_facts:
    get:
      tags:
        - EDGAR
      summary: Company Facts
      description: Returns all the company concepts data for a specific CIK.
      parameters:
        - name: access_key
          in: query
          description: Your Marketstack API access key.
          required: true
          schema:
            type: string
        - name: cik_code
          in: query
          description: 10-digit SEC Central Index Key (with leading zeros).
          required: true
          schema:
            type: string
      responses:
        '200':
