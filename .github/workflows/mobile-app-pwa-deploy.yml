name: Mobile App PWA Deploy

on:
  push:
    branches: [main]
    paths:
      - "mobile-app/**"
      - "mobile-app/cloudformation/**"
      - ".github/workflows/mobile-app-pwa-deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-1' }}
  AWS_CERT_REGION: ${{ vars.AWS_CERT_REGION || 'us-east-1' }}
  PWA_STACK_NAME: ${{ vars.PWA_STACK_NAME || 'moneycoach-pwa' }}
  PWA_CERT_STACK_NAME: ${{ vars.PWA_CERT_STACK_NAME || 'moneycoach-pwa-cert' }}
  PWA_DOMAIN_NAME: ${{ vars.PWA_DOMAIN_NAME || 'demo.moneycoach.cc' }}
  HOSTED_ZONE_NAME: ${{ vars.HOSTED_ZONE_NAME || 'moneycoach.cc.' }}
  HOSTED_ZONE_ID: ${{ vars.HOSTED_ZONE_ID || '' }}
  PWA_BUCKET_NAME: ${{ vars.PWA_BUCKET_NAME || 'demo.moneycoach.cc' }}
  PWA_API_BASE_URL: ${{ vars.PWA_API_BASE_URL || 'https://api.moneycoach.cc' }}
  EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ vars.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID || '' }}
  EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ vars.EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY || '' }}
  EXPO_PUBLIC_TERMS_URL: ${{ vars.EXPO_PUBLIC_TERMS_URL || 'https://moneycoach.cc/terms' }}
  EXPO_PUBLIC_PRIVACY_URL: ${{ vars.EXPO_PUBLIC_PRIVACY_URL || 'https://moneycoach.cc/privacy' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile-app/package-lock.json

      - name: Install dependencies
        run: |
          cd mobile-app
          npm ci

      - name: Build PWA
        env:
          EXPO_PUBLIC_API_BASE_URL: ${{ env.PWA_API_BASE_URL }}
          EXPO_PUBLIC_PWA_URL: https://${{ env.PWA_DOMAIN_NAME }}
          EXPO_PUBLIC_TERMS_URL: ${{ env.EXPO_PUBLIC_TERMS_URL }}
          EXPO_PUBLIC_PRIVACY_URL: ${{ env.EXPO_PUBLIC_PRIVACY_URL }}
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ env.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
          EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ env.EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
        run: |
          cd mobile-app
          npx expo export --platform web

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy ACM certificate (us-east-1)
        run: |
          if [ -z "$HOSTED_ZONE_ID" ]; then
            echo "HOSTED_ZONE_ID is required to validate the certificate."
            exit 1
          fi
          aws cloudformation deploy \
            --region "$AWS_CERT_REGION" \
            --stack-name "$PWA_CERT_STACK_NAME" \
            --template-file "mobile-app/cloudformation/pwa-cert.yaml" \
            --parameter-overrides \
              AppDomainName="$PWA_DOMAIN_NAME" \
              HostedZoneId="$HOSTED_ZONE_ID"

      - name: Deploy PWA stack
        run: |
          CERT_ARN=$(aws cloudformation describe-stacks \
            --region "$AWS_CERT_REGION" \
            --stack-name "$PWA_CERT_STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='CertificateArn'].OutputValue" \
            --output text)
          aws cloudformation deploy \
            --region "$AWS_REGION" \
            --stack-name "$PWA_STACK_NAME" \
            --template-file "mobile-app/cloudformation/pwa.yaml" \
            --parameter-overrides \
              AppDomainName="$PWA_DOMAIN_NAME" \
              HostedZoneName="$HOSTED_ZONE_NAME" \
              AcmCertificateArn="$CERT_ARN" \
              SiteBucketName="$PWA_BUCKET_NAME"

      - name: Upload assets to S3 and invalidate CDN
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --region "$AWS_REGION" \
            --stack-name "$PWA_STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='SiteBucketName'].OutputValue" \
            --output text)
          DIST_ID=$(aws cloudformation describe-stacks \
            --region "$AWS_REGION" \
            --stack-name "$PWA_STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" \
            --output text)
          aws s3 sync mobile-app/dist "s3://$BUCKET" --delete
          aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
