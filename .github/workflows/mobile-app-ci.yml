name: mobile-app-ci

on:
  push:
    paths:
      - "mobile-app/**"
      - ".github/workflows/mobile-app-ci.yml"
  pull_request:
    paths:
      - "mobile-app/**"
      - ".github/workflows/mobile-app-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: mobile-app/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
        env:
          CI: true
