name: Web Frontend Deploy

on:
  push:
    branches: [main]
    paths:
      - "web-frontend/**"
      - ".github/workflows/web-frontend-deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-1' }}
  WEB_STACK_NAME: ${{ vars.WEB_STACK_NAME || 'moneycoach-web' }}
  WEB_SERVICE_NAME: ${{ vars.WEB_SERVICE_NAME || 'moneycoach-web' }}
  WEB_ECR_REPO: ${{ vars.WEB_ECR_REPO || 'moneycoach-web' }}
  WEB_CFN_TEMPLATE: ${{ vars.WEB_CFN_TEMPLATE || 'web-frontend/cloudformation/frontend.yaml' }}
  WEB_DOCKER_BUILD_CONTEXT: ${{ vars.WEB_DOCKER_BUILD_CONTEXT || 'web-frontend' }}
  WEB_DOCKERFILE_PATH: ${{ vars.WEB_DOCKERFILE_PATH || 'web-frontend/Dockerfile' }}
  WEB_CPU: ${{ vars.WEB_CPU || '512' }}
  WEB_MEMORY: ${{ vars.WEB_MEMORY || '1024' }}
  WEB_DESIRED_COUNT: ${{ vars.WEB_DESIRED_COUNT || '1' }}
  WEB_CONTAINER_PORT: ${{ vars.WEB_CONTAINER_PORT || '3000' }}
  WEB_ROOT_DOMAIN_NAME: ${{ vars.WEB_ROOT_DOMAIN_NAME || 'moneycoach.cc' }}
  WEB_WWW_DOMAIN_NAME: ${{ vars.WEB_WWW_DOMAIN_NAME || 'www.moneycoach.cc' }}
  HOSTED_ZONE_NAME: ${{ vars.HOSTED_ZONE_NAME || 'moneycoach.cc.' }}
  HOSTED_ZONE_ID: ${{ vars.HOSTED_ZONE_ID || '' }}
  WEB_HEALTH_CHECK_PATH: ${{ vars.WEB_HEALTH_CHECK_PATH || '/healthz' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Hosted Zone ID
        run: |
          if [ -z "$HOSTED_ZONE_ID" ]; then
            echo "HOSTED_ZONE_ID is required to validate ACM certificates and Route53 records."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repository if missing
        run: |
          aws ecr describe-repositories --repository-names "$WEB_ECR_REPO" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$WEB_ECR_REPO" >/dev/null

      - name: Build and push image
        run: |
          IMAGE_URI="${{ steps.ecr.outputs.registry }}/$WEB_ECR_REPO:sha-${GITHUB_SHA}"
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV
          docker build -f "$WEB_DOCKERFILE_PATH" -t "$IMAGE_URI" "$WEB_DOCKER_BUILD_CONTEXT"
          docker push "$IMAGE_URI"

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --stack-name "$WEB_STACK_NAME" \
            --template-file "$WEB_CFN_TEMPLATE" \
            --capabilities CAPABILITY_NAMED_IAM CAPABILITY_IAM \
            --parameter-overrides \
              ServiceName="$WEB_SERVICE_NAME" \
              ContainerImage="$IMAGE_URI" \
              CPU="$WEB_CPU" \
              Memory="$WEB_MEMORY" \
              DesiredCount="$WEB_DESIRED_COUNT" \
              ContainerPort="$WEB_CONTAINER_PORT" \
              RootDomainName="$WEB_ROOT_DOMAIN_NAME" \
              WwwDomainName="$WEB_WWW_DOMAIN_NAME" \
              HostedZoneName="$HOSTED_ZONE_NAME" \
              HostedZoneId="$HOSTED_ZONE_ID" \
              HealthCheckPath="$WEB_HEALTH_CHECK_PATH"

      - name: Show stack outputs
        run: |
          aws cloudformation describe-stacks --stack-name "$WEB_STACK_NAME" \
            --query "Stacks[0].Outputs" --output json | jq -r '.[] | "\(.OutputKey)=\(.OutputValue)"'
